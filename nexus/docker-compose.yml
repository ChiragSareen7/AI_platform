version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  gateway:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: bash -lc "pip install -e . && uvicorn gateway.main:app --host 0.0.0.0 --port 8090 --reload"
    env_file:
      - .env
    ports:
      - "8090:8090"
    depends_on:
      - postgres
      - redis

  dashboard:
    image: node:20
    working_dir: /app/dashboard
    volumes:
      - ./dashboard:/app/dashboard
    command: bash -lc "npm install && npm run dev -- --hostname 0.0.0.0 --port 3005"
    ports:
      - "3005:3005"

volumes:
  pg_data:

